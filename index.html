<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Te amo Marisol</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        /* 1. ANIMACIÓN DEL FONDO */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            animation: cambiarFondo 10s infinite alternate;
            background-color: #ffffff;
            overflow: hidden; 
        }

        @keyframes cambiarFondo {
            0% { background-color: #ffffff; } 
            100% { background-color: #ffb6c1; } 
        }

        /* 2. ESTILOS DEL CORAZÓN */
        .contenedor-corazon {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            animation: latido 1.5s infinite;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }

        .corazon {
            position: relative;
            width: 60px;
            height: 60px;
            background-color: #e60026; 
            transform: rotate(-45deg);
        }

        .corazon::before, .corazon::after {
            content: ""; position: absolute; width: 60px; height: 60px;
            background-color: #e60026; border-radius: 50%;
        }
        .corazon::before { top: -30px; left: 0; }
        .corazon::after { top: 0; left: 30px; }

        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .mensaje-flotante {
            position: absolute; color: white; background-color: #e60026; 
            padding: 10px 20px; border-radius: 20px; font-weight: bold;
            font-size: 16px; pointer-events: none; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); z-index: 20;
            white-space: nowrap; animation: flotar 3s ease-out forwards;
        }

        @keyframes flotar {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(calc(-50% + var(--fin-x)), calc(-50% + var(--fin-y))) scale(1); }
        }

        /* 3. GALERÍA DE CUADRÍCULAS UNIFORMES */
        #contenedor-galeria {
            display: none; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 20px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            z-index: 30;
        }

        .miniatura {
            width: 100%;
            aspect-ratio: 1 / 1; /* Esto las hace cuadradas */
            object-fit: cover; /* Centra y recorta para llenar el cuadrado */
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }

        /* 4. VISOR DE IMAGEN TAMAÑO ORIGINAL (MODAL) */
        #modal-visor {
            display: none; /* Oculto por defecto */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); /* Fondo negro transparente */
            z-index: 100;
            justify-content: center; align-items: center;
        }

        .modal-contenido {
            position: relative;
            max-width: 90vw; /* Máximo ancho de la pantalla */
            max-height: 85vh; /* Máximo alto de la pantalla */
            perspective: 1000px;
        }

        /* La X Opaca */
        #btn-cerrar-modal {
            position: absolute;
            top: 10px; right: 10px;
            background-color: rgba(0, 0, 0, 0.5); /* Semi opaca */
            color: white; border: none; font-size: 24px;
            width: 35px; height: 35px; border-radius: 50%;
            cursor: pointer; z-index: 20; /* Encima de la imagen */
            display: flex; justify-content: center; align-items: center;
        }

        .tarjeta-modal {
            width: 100%; height: 100%;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .tarjeta-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s; transform-style: preserve-3d;
        }

        .tarjeta-modal.volteada .tarjeta-inner {
            transform: rotateY(180deg);
        }

        .tarjeta-front, .tarjeta-back {
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .tarjeta-front img {
            max-width: 90vw; max-height: 85vh;
            display: block; border-radius: 12px;
            object-fit: contain; /* Mantiene proporciones originales (horizontal, vertical o cuadrado) */
        }

        .tarjeta-back {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #fff0f5; color: #d10047;
            transform: rotateY(180deg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box;
            font-family: 'Dancing Script', cursive; font-size: 1.5rem; text-align: center;
        }

        .boton-descarga {
            margin-top: 15px; padding: 8px 16px; background-color: #e60026;
            color: white; text-decoration: none; border-radius: 20px;
            font-family: 'Arial', sans-serif; font-size: 0.9rem; font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div id="boton-corazon" class="contenedor-corazon">
        <div class="corazon"></div>
    </div>

    <div id="contenedor-galeria"></div>

    <div id="modal-visor">
        <div class="modal-contenido">
            <button id="btn-cerrar-modal">&times;</button>
            
            <div class="tarjeta-modal" id="tarjeta-modal">
                <div class="tarjeta-inner">
                    <div class="tarjeta-front">
                        <img id="modal-img" src="" alt="Recuerdo">
                    </div>
                    <div class="tarjeta-back">
                        <div id="modal-texto"></div>
                        <a id="modal-descarga" class="boton-descarga">⬇️ Guardar foto</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. Agregamos 'query' y 'orderBy' a la lista de importaciones
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // --- PEGA AQUÍ TU firebaseConfig ---
        const firebaseConfig = {
            apiKey: "AIzaSyCQ4uGItSmxcor0BEEMj7wcgV1ZnQam0Q0",
            authDomain: "palabras-del-corazon-b00f0.firebaseapp.com",
            projectId: "palabras-del-corazon-b00f0",
            storageBucket: "palabras-del-corazon-b00f0.firebasestorage.app",
            messagingSenderId: "9438065030",
            appId: "1:9438065030:web:c2b5114d4d7188a744bc07"
        };

        // -----------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let recuerdos = [];

        async function cargarDatosDeFirebase() {
            try {
                // 2. Aquí está la magia: le pedimos a Firebase que las ordene por el campo 'orden'
                const consultaOrdenada = query(collection(db, "recuerdos"), orderBy("orden"));
                const querySnapshot = await getDocs(consultaOrdenada);
                
                querySnapshot.forEach((doc) => {
                    recuerdos.push(doc.data());
                });
            } catch (error) {
                console.error("Error cargando los recuerdos: ", error);
            }
        }
        cargarDatosDeFirebase();

        const mensajesFlotantes = [
            "Te amo", "Eres todo para mi", "Me haces el hombre más feliz",
            "Mi lugar favorito es contigo", "Siempre pienso en ti",
            "Eres mi persona favorita", "Me encantas",
            "Gracias por estar en mi vida", "Solo Dios sabe lo mucho que te amo",
            "Gracias por existir", "Nunca dejes de sonreir",
            "No me siento completo si no estás", "Tu amor es todo lo que necesito",
            "Tus abrazos me dan paz", "Me encanta perderme en tu mirada"
        ];

        let indiceMensaje = 0;
        let contadorClics = 0; 
        const LIMITE_CLICS = 30; 
        const botonCorazon = document.getElementById('boton-corazon');
        const contenedorGaleria = document.getElementById('contenedor-galeria');
        const modalVisor = document.getElementById('modal-visor');
        const btnCerrarModal = document.getElementById('btn-cerrar-modal');
        const tarjetaModal = document.getElementById('tarjeta-modal');

        botonCorazon.addEventListener('click', () => {
            contadorClics++; 

            if (contadorClics > LIMITE_CLICS) {
                botonCorazon.style.display = 'none';
                document.body.style.alignItems = 'flex-start'; 
                document.body.style.overflow = 'auto'; 
                contenedorGaleria.style.display = 'grid';
                construirGaleria();
                return; 
            }

            const texto = mensajesFlotantes[indiceMensaje];
            indiceMensaje = (indiceMensaje + 1) % mensajesFlotantes.length;
            crearMensajeFlotante(texto);
        });

        function crearMensajeFlotante(texto) {
            const mensaje = document.createElement('div');
            mensaje.classList.add('mensaje-flotante');
            mensaje.innerText = texto;

            const angulo = Math.random() * Math.PI * 2; 
            const distancia = 120 + Math.random() * 130; 
            const finX = Math.cos(angulo) * distancia;
            const finY = Math.sin(angulo) * distancia;

            mensaje.style.setProperty('--fin-x', `${finX}px`);
            mensaje.style.setProperty('--fin-y', `${finY}px`);
            mensaje.style.left = `50%`;
            mensaje.style.top = `50%`;

            document.body.appendChild(mensaje);
            setTimeout(() => { mensaje.remove(); }, 3000);
        }

        // Dibuja las miniaturas cuadradas
        function construirGaleria() {
            if (recuerdos.length === 0) {
                contenedorGaleria.innerHTML = "<p style='color: white; text-align: center; width: 100%; grid-column: span 2;'>Cargando nuestros recuerdos hermosos...</p>";
                setTimeout(construirGaleria, 1000);
                return;
            }
            contenedorGaleria.innerHTML = "";

            recuerdos.forEach((recuerdo, index) => {
                const imgMiniatura = document.createElement('img');
                imgMiniatura.src = recuerdo.imagen;
                imgMiniatura.classList.add('miniatura');
                
                // Al tocar una miniatura, abrimos el visor
                imgMiniatura.addEventListener('click', () => {
                    abrirVisor(recuerdo, index);
                });

                contenedorGaleria.appendChild(imgMiniatura);
            });
        }

        // Llena los datos y muestra la pantalla oscura con la foto
        function abrirVisor(recuerdo, index) {
            tarjetaModal.classList.remove('volteada'); // Asegura que siempre inicie mostrando la foto
            
            document.getElementById('modal-img').src = recuerdo.imagen;
            document.getElementById('modal-texto').innerText = recuerdo.texto;
            
            const btnDescarga = document.getElementById('modal-descarga');
            btnDescarga.href = recuerdo.imagen;
            btnDescarga.download = `Recuerdo_Marisol_${index + 1}.jpg`;

            modalVisor.style.display = 'flex';
        }

        // Lógica de interacciones dentro del visor
        tarjetaModal.addEventListener('click', () => {
            tarjetaModal.classList.toggle('volteada');
        });

        document.getElementById('modal-descarga').addEventListener('click', (evento) => {
            evento.stopPropagation(); // Evita que al dar clic en descargar, la foto se gire
        });

        // Lógica para cerrar con la X
        btnCerrarModal.addEventListener('click', (evento) => {
            evento.stopPropagation(); 
            modalVisor.style.display = 'none';
        });
    </script>
</body>
</html>
