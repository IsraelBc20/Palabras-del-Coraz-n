<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi amor</title>
    <style>
        /* 1. ANIMACIÓN DEL FONDO (SOLO BLANCO A ROSADO) */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            /* Cambia suavemente entre blanco y un rosado claro */
            animation: cambiarFondo 10s infinite alternate;
            background-color: #ffffff;
        }

        @keyframes cambiarFondo {
            0% { background-color: #ffffff; } 
            100% { background-color: #ffb6c1; } 
        }

        /* 2. ESTILOS DEL CORAZÓN (EL BOTÓN) */
        .contenedor-corazon {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            animation: latido 1.5s infinite;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }

        .corazon {
            position: relative;
            width: 60px;
            height: 60px;
            background-color: #e60026; 
            transform: rotate(-45deg);
        }

        .corazon::before,
        .corazon::after {
            content: "";
            position: absolute;
            width: 60px;
            height: 60px;
            background-color: #e60026; 
            border-radius: 50%;
        }

        .corazon::before {
            top: -30px;
            left: 0;
        }

        .corazon::after {
            top: 0;
            left: 30px;
        }

        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* 3. ESTILOS DE LOS MENSAJES FLOTANTES */
        .mensaje-flotante {
            position: absolute;
            color: white;
            background-color: #e60026; 
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 16px;
            pointer-events: none; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 20;
            white-space: nowrap;
            animation: flotar 3s ease-out forwards;
        }

        @keyframes flotar {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.5); 
            }
            15% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1.1); 
            }
            100% { 
                opacity: 0; 
                transform: translate(calc(-50% + var(--fin-x)), calc(-50% + var(--fin-y))) scale(1); 
            }
        }

        /* 4. MENSAJE PERSISTENTE DE LÍMITE SUPERADO */
        .mensaje-limite-excedido {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px; 
            font-weight: bold;
            color: white; 
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8); 
            text-align: center;
            max-width: 80%; 
            z-index: 50; 
            white-space: normal; 
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="boton-corazon" class="contenedor-corazon">
        <div class="corazon"></div>
    </div>

    <script>
        const mensajes = [
            "Te amo",
            "Eres todo para mi",
            "Me haces el hombre más feliz",
            "Mi lugar favorito es contigo",
            "Siempre pienso en ti",
            "Eres mi persona favorita",
            "Me encantas",
            "Gracias por estar en mi vida",
            "Solo Dios sabe lo mucho que te amo",
            "Gracias por existir",
            "Nunca dejes de sonreir",
            "No me siento completo si no estás"
        ];

        let indiceMensaje = 0;
        let contadorClics = 0; // Esta variable se reinicia a 0 cada vez que se actualiza la página
        const LIMITE_CLICS = 30;
        const botonCorazon = document.getElementById('boton-corazon');

        botonCorazon.addEventListener('click', () => {
            contadorClics++; // Sumamos un clic

            // Si se pasa de los 30 clics (es decir, el clic 31)
            if (contadorClics > LIMITE_CLICS) {
                // Ocultar el corazón
                botonCorazon.style.display = 'none';

                // Mostrar el mensaje final
                const mensajeExcedido = document.createElement('div');
                mensajeExcedido.innerText = "Si mis palabras no te son suficiente dímelo para ir a darte muchos besos hasta donde estés";
                mensajeExcedido.classList.add('mensaje-limite-excedido');
                document.body.appendChild(mensajeExcedido);
                
                return; // Detenemos la función aquí
            }

            // Si tiene 30 clics o menos, mostramos el mensaje flotante
            const texto = mensajes[indiceMensaje];
            indiceMensaje = (indiceMensaje + 1) % mensajes.length;
            crearMensajeFlotante(texto);
        });

        function crearMensajeFlotante(texto) {
            const mensaje = document.createElement('div');
            mensaje.classList.add('mensaje-flotante');
            mensaje.innerText = texto;

            const angulo = Math.random() * Math.PI * 2; 
            const distancia = 120 + Math.random() * 130; 
            
            const finX = Math.cos(angulo) * distancia;
            const finY = Math.sin(angulo) * distancia;

            mensaje.style.setProperty('--fin-x', `${finX}px`);
            mensaje.style.setProperty('--fin-y', `${finY}px`);

            mensaje.style.left = `50%`;
            mensaje.style.top = `50%`;

            document.body.appendChild(mensaje);

            setTimeout(() => {
                mensaje.remove();
            }, 3000);
        }
    </script>
</body>
</html>
